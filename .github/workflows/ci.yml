name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App (lint + typecheck + unit tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
      - run: pnpm exec vitest run
      - run: pnpm build

  logic:
    name: Logic (contract tests + WASM build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: logic
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the toolchain; rustup picks it up automatically.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: logic
      - name: Contract unit tests (native, TestHost)
        run: cargo test
      - name: WASM build
        run: ./build.sh

  e2e:
    name: E2E (2-node signaling over merobox)
    runs-on: ubuntu-latest
    needs: logic
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: logic
      - name: Build contract WASM
        working-directory: logic
        run: ./build.sh
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install merobox
        run: pip install merobox
      - name: Run signaling e2e (offer/answer/ice through the contract)
        working-directory: workflows
        run: merobox bootstrap run e2e.yml
      - name: Stop nodes
        if: always()
        run: merobox stop --all || true
