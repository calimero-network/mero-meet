# coturn config for Mero Meet — independent, self-hosted STUN + TURN relay.
# Placeholders REPLACE_* are filled by ../setup.sh from the values in ../.env.

listening-port=3478
# tls-listening-port=5349        # Phase 2 (turns:) — uncomment with cert/pkey below

# --- AWS NAT mapping (CRITICAL) -------------------------------------------------
# The instance only sees its PRIVATE ip, but clients reach it via the ELASTIC ip.
# coturn must advertise the public ip in relayed candidates or every relayed call
# fails. Format: external-ip=<PUBLIC_IP>/<PRIVATE_IP>
external-ip=REPLACE_PUBLIC_IP/REPLACE_PRIVATE_IP

# --- Ephemeral credentials (TURN REST API) --------------------------------------
# Credentials are HMAC-SHA1(static-auth-secret, expiry). The cred-service mints
# them; this secret MUST match TURN_SECRET there.
use-auth-secret
static-auth-secret=REPLACE_TURN_SECRET
realm=REPLACE_TURN_DOMAIN

fingerprint

# --- Relay port range -----------------------------------------------------------
# Open these as UDP ingress in the security group.
min-port=49152
max-port=65535

# --- Hardening: never relay into private / link-local space ---------------------
# Stops this box from being used to reach the AWS metadata service, your existing
# relayer node, or any internal host. Public peers (real call participants) are
# unaffected, so legitimate calls still work.
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# --- Quotas to bound abuse ------------------------------------------------------
total-quota=200
user-quota=12
stale-nonce=600

# --- Misc ----------------------------------------------------------------------
no-cli
no-tlsv1
no-tlsv1_1
log-file=stdout
simple-log

# --- Phase 2: turns over TLS ----------------------------------------------------
# Drop a cert at ./certs (mount it into the container) and uncomment:
# cert=/etc/coturn/certs/cert.pem
# pkey=/etc/coturn/certs/privkey.pem
